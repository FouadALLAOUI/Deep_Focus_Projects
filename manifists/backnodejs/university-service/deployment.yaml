apiVersion: apps/v1
kind: Deployment
metadata:
  name: university-service-deployment
  namespace: university-service
  labels:
    app: university-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: university-service
  template:
    metadata:
      labels:
        app: university-service
    spec:
      containers:
        - name: university-service
          image: fouadallaoui/university-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3001"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 30
