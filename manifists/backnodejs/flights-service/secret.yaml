# Template — fill in real values before applying.
# Apply manually: kubectl apply -f secret.yaml
# OpenSky credentials are optional — live flights work without them.
# Register free at: https://opensky-network.org/
apiVersion: v1
kind: Secret
metadata:
  name: flights-service-secrets
  namespace: flights-service
type: Opaque
stringData:
  opensky-username: "REPLACE_WITH_YOUR_OPENSKY_USERNAME"
  opensky-password: "REPLACE_WITH_YOUR_OPENSKY_PASSWORD"
