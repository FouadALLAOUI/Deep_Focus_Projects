apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hotels-service
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/FouadALLAOUI/Deep_Focus_Projects.git
    targetRevision: HEAD
    path: manifists/backnodejs/hotels-service
  destination:
    server: https://kubernetes.default.svc
    namespace: hotels-service
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
