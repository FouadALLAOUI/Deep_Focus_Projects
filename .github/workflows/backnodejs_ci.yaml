name: Backend Microservices CI/CD

on:
#  push:
#    branches:
#      - main
#    paths:
#      - 'backnodejs/**'
  pull_request:
    branches:
      - main
    paths:
      - 'backnodejs/**'

env:
  NODE_VERSION: '20'

jobs:
  # Detect which services changed to avoid rebuilding everything on each push
  changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            university-service:
              - 'backnodejs/university-service/**'
            hotels-service:
              - 'backnodejs/hotels-service/**'
            market-service:
              - 'backnodejs/market-service/**'
            flights-service:
              - 'backnodejs/flights-service/**'

  quality:
    name: Audit — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.services != '[]' && needs.changes.outputs.services != '' }}
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.changes.outputs.services) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backnodejs/${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        working-directory: backnodejs/${{ matrix.service }}
        run: npm ci

      - name: Security audit
        working-directory: backnodejs/${{ matrix.service }}
        run: npm audit --audit-level=high

  docker:
    name: Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [changes, quality]
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.changes.outputs.services != '[]' &&
      needs.changes.outputs.services != ''
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.changes.outputs.services) }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: backnodejs/${{ matrix.service }}
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:latest

  update-manifests:
    name: Update GitOps Manifests
    runs-on: ubuntu-latest
    needs: [changes, docker]
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.changes.outputs.services != '[]' &&
      needs.changes.outputs.services != ''
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tags for all changed services
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          CHANGED_SERVICES: ${{ needs.changes.outputs.services }}
        run: |
          for service in $(echo "$CHANGED_SERVICES" | jq -r '.[]'); do
            sed -i \
              "s|image: .*/${service}:.*|image: ${DOCKER_USERNAME}/${service}:${{ github.sha }}|" \
              manifists/backnodejs/${service}/deployment.yaml
            echo "Updated image tag for ${service}"
          done

      - name: Commit and push manifest updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifists/backnodejs/
          if git diff --staged --quiet; then
            echo "No manifest changes to commit"
          else
            git commit -m "chore: deploy backend services@${{ github.sha }} [skip ci]"
            git push
          fi
