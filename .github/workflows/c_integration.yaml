name: Frontend CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: '20'
  WORKING_DIRECTORY: frontnextjs

jobs:
  quality:
    name: Lint, Test, Audit, Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.WORKING_DIRECTORY }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm ci

      - name: Lint
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm run lint

      - name: Test
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm run test:ci

      - name: Security audit
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm run audit

      - name: Build
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontnextjs-build
          path: |
            ${{ env.WORKING_DIRECTORY }}/.next
            ${{ env.WORKING_DIRECTORY }}/public

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.WORKING_DIRECTORY }}
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/frontnextjs:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/frontnextjs:latest

  update-manifests:
    name: Update GitOps Manifests
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tag in deployment manifest
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        run: |
          sed -i "s|image: .*/frontnextjs:.*|image: ${DOCKER_USERNAME}/frontnextjs:${{ github.sha }}|" \
            manifists/frontnextjs/deployment.yaml

      - name: Commit and push manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifists/frontnextjs/deployment.yaml
          if git diff --staged --quiet; then
            echo "No manifest changes to commit"
          else
            git commit -m "chore: deploy frontnextjs@${{ github.sha }} [skip ci]"
            git push
          fi
